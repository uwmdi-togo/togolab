# AWS / S3 (Kopah) settings shared by everyone.
aws:
  region: ""
  endpoint: "s3.kopah.uw.edu"

# Per-user paths. The top-level key MUST match the OS username returned by
# R's Sys.info()[["user"]]. `kopah_keys` is the path to that user's Kopah
# keys file (.json or .csv). `redcap_tokens` is OPTIONAL: a path to a CSV with
# Study,Token columns. Users without REDCap tokens can simply omit that line.
